site_name: UCI Rocket Project Overview
theme:
    name: mkdocs
    color_mode: dark
    highlightjs: true

markdown_extensions:
  - attr_list
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.superfences



nav:
  - Avionics Overview: index.md
  - Technical Documentation:
    - Data Packets & Networking: data_packets.md
    - Standardized Connectors: standardized_connectors.md
  - Standards & Onboarding:
    - Hardware Setup & Guidelines: hardware_setup_&_guidelines.md
    - Software Convention & Styling: software_guidelines.md
    - STM32 / VSCode Extension Guide: stm32_vscode_guide.md